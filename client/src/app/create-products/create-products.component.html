<div class="container">

  <h2>{{ editingId ? 'Edit Product' : 'Create Product' }}</h2>

  <!-- ✅ Messages -->
  <div *ngIf="successMsg" class="success">{{ successMsg }}</div>
  <div *ngIf="errorMsg" class="error">{{ errorMsg }}</div>

  <!-- ✅ Form -->
  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form">

    <input type="text" formControlName="name" placeholder="Product Name" />
    <div class="error" *ngIf="itemForm.get('name')?.touched && itemForm.get('name')?.invalid">
      Name is required
    </div>

    <textarea formControlName="description" placeholder="Description"></textarea>
    <div class="error" *ngIf="itemForm.get('description')?.touched && itemForm.get('description')?.invalid">
      Description is required
    </div>

    <input type="number" formControlName="price" placeholder="Price" />
    <div class="error" *ngIf="itemForm.get('price')?.touched && itemForm.get('price')?.invalid">
      Enter valid price
    </div>

    <input type="text" formControlName="stockQuantity" placeholder="Stock Quantity" />
    <div class="error" *ngIf="itemForm.get('stockQuantity')?.touched && itemForm.get('stockQuantity')?.invalid">
      Enter valid quantity
    </div>

    <div class="btn-group">
      <button type="submit">
        {{ editingId ? 'Update' : 'Create' }}
      </button>

      <button type="button" *ngIf="editingId" (click)="cancelEdit()">
        Cancel
      </button>
    </div>

  </form>

  <!-- ✅ ❌ REMOVE ngModel -->
  <div class="search">
    <input
      type="text"
      placeholder="Search products..."
      (input)="searchTerm = $any($event.target).value; applyFilter()"
    />
  </div>

  <!-- ✅ Product List -->
  <div class="product-list">

    <div class="card" *ngFor="let p of filtered">

      <h3>{{ p.name }}</h3>
      <p>{{ p.description }}</p>

      <div class="info">
        <span>₹ {{ p.price }}</span>
        <span>Stock: {{ p.stockQuantity }}</span>
      </div>

      <button (click)="editProduct(p)">Edit</button>

    </div>

  </div>

</div>
