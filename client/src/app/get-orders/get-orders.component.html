<div class="container mt-3">

  <!-- Heading -->
  <h3>Orders</h3>

  <!-- Messages -->
  <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>
  <div class="alert alert-danger" *ngIf="errorMsg">{{ errorMsg }}</div>

  <!-- Order Table -->
  <div class="card mb-3">
    <div class="card-header">
      Order Information
    </div>

    <div class="card-body">

      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Sr#</th>
            <th>Quantity</th>
            <th>Status</th>
            <th>Product</th>
            <th>Update Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let order of orders; let i = index">

            <td>{{ i + 1 }}</td>
            <td>{{ order.quantity }}</td>
            <td>{{ order.status }}</td>

            <!-- Product Info -->
            <td>
              <div><b>{{ order.product?.name }}</b></div>
              <div>₹ {{ order.product?.price }}</div>
              <div class="text-muted">{{ order.product?.description }}</div>
            </td>

            <!-- ✅ FIX: Bind dropdown -->
            <td>
              <select class="form-control"
                      [(ngModel)]="order.selectedStatus">
                <option value="">Select Status</option>
                <option *ngFor="let s of statuses" [value]="s">
                  {{ s }}
                </option>
              </select>
            </td>

            <!-- ✅ Action -->
            <td>
              <button class="btn btn-primary btn-sm"
                      (click)="processOrder(order)">
                Process
              </button>
            </td>

          </tr>
        </tbody>

      </table>

    </div>
  </div>

</div>
