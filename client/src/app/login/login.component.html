<div class="login-container">
  <div class="login-card">

    <!-- Heading -->
    <h2>
      SUPPLY-OF-GOODS <br>
      MANAGEMENT AND <br>
      DISTRIBUTION PLATFORM
    </h2>

    <p class="subtitle">Please enter your user and password!</p>

    <!-- Error -->
    <div *ngIf="errorMsg" class="error-msg">
      {{ errorMsg }}
    </div>

    <!-- Form -->
    <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

      <!-- Username -->
      <label>Username</label>
      <input type="text" formControlName="username" placeholder="name@example.com">

      <div class="validation"
        *ngIf="itemForm.get('username')?.touched && itemForm.get('username')?.invalid">
        Username is required
      </div>

      <!-- ✅ Password -->
      <label>Password</label>

      <div class="password-box">

        <input 
          [type]="showPassword ? 'text' : 'password'" 
          formControlName="password" 
          placeholder="******">

        <!-- ✅ Eye Icon -->
        <span (click)="togglePassword()" class="eye-icon">
          <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
        </span>

      </div>

      <div class="validation"
        *ngIf="itemForm.get('password')?.touched && itemForm.get('password')?.invalid">
        Password is required
      </div>

      <!-- Button -->
      <button type="submit" [disabled]="itemForm.invalid">
        Login
      </button>

    </form>

    <!-- Footer -->
    <p class="footer">
      Don’t have an account?
      <a routerLink="/registration">Registration</a>
    </p>

  </div>
</div>
