<div class="container">

  <h2>Place Order</h2>

  <!-- ✅ Messages -->
  <div class="msg success" *ngIf="successMsg">{{ successMsg }}</div>
  <div class="msg error" *ngIf="errorMsg">{{ errorMsg }}</div>

  <!-- ✅ FORM -->
  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form">

    <!-- Quantity -->
    <div>
      <input
        type="number"
        formControlName="quantity"
        placeholder="Enter Quantity" />

      <!-- Validation -->
      <div class="error"
           *ngIf="itemForm.get('quantity')?.touched && itemForm.get('quantity')?.invalid">
        Quantity is required and must be a number
      </div>
    </div>

    <!-- Status -->
    <div>
      <select formControlName="status">

        <option value="">Select Status</option>
        <option value="PENDING">Pending</option>
        <option value="CONFIRMED">Confirmed</option>

      </select>

      <!-- Validation -->
      <div class="error"
           *ngIf="itemForm.get('status')?.touched && itemForm.get('status')?.invalid">
        Status is required
      </div>
    </div>

    <!-- Submit -->
    <button type="submit">
      Place Order
    </button>

  </form>

  <!-- ✅ PRODUCT LIST -->
  <div class="product-list">

    <div class="card"
         *ngFor="let p of products"
         [class.active]="selectedProductId === p.id">

      <h3>{{ p.name }}</h3>
      <p>{{ p.description }}</p>

      <div class="info">
        <span>₹ {{ p.price }}</span>
        <span>Stock: {{ p.stockQuantity }}</span>
      </div>

      <button
        type="button"
        (click)="selectProduct(p.id)"
        [disabled]="p.stockQuantity === 0">

        {{ p.stockQuantity === 0 ? 'Out of Stock' : 'Select Product' }}
      </button>

    </div>

  </div>

</div>
