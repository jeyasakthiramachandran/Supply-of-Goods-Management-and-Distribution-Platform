<div class="container">

  <h2>Consumer Place Order</h2>

  <!-- MESSAGES -->
  <div class="success" *ngIf="successMsg">{{ successMsg }}</div>
  <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>

  <!-- FORM -->
  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form">

    <input type="number" formControlName="quantity" placeholder="Enter Quantity" />

    <select formControlName="status">
      <option value="PENDING">Pending</option>
      <option value="DELIVERED">DELIVERED</option>
    </select>

    <button type="submit">Place Order</button>
  </form>

  <!-- PRODUCTS -->
  <div class="product-list">

    <div class="card"
         *ngFor="let p of products"
         [class.active]="selectedProductId === p.id">

      <h3>{{ p.name }}</h3>
      <p>{{ p.description }}</p>

      <div class="info">
        <span>₹ {{ p.price }}</span>
        <span>Stock: {{ p.stockQuantity }}</span>
      </div>

      <button
        (click)="selectProduct(p.id)"
        [disabled]="p.stockQuantity === 0">

        {{ p.stockQuantity === 0 ? 'Out of Stock' : 'Select' }}
      </button>

    </div>

  </div>

</div>
